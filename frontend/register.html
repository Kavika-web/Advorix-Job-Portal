<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register – Advorix Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Inter', sans-serif; }</style>
  </head>
  <body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md">

      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="index.html">
          <h1 class="text-3xl font-bold text-blue-600">Advorix<span class="text-gray-800">Jobs</span></h1>
        </a>
        <p class="text-gray-500 mt-2 text-sm">Create your candidate account</p>
      </div>

      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">👤 Candidate Registration</h2>

        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-sm font-medium text-gray-700 block mb-1">First Name</label>
              <input type="text" placeholder="John"
                class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
            </div>
            <div>
              <label class="text-sm font-medium text-gray-700 block mb-1">Last Name</label>
              <input type="text" placeholder="Doe"
                class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
            </div>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-700 block mb-1">Email Address</label>
            <input type="email" placeholder="you@example.com"
              class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-700 block mb-1">Phone Number</label>
            <input type="tel" placeholder="+1 234 567 8900"
              class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-700 block mb-1">Password</label>
            <input type="password" placeholder="Min. 8 characters"
              class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-700 block mb-1">Confirm Password</label>
            <input type="password" placeholder="••••••••"
              class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
          </div>
          <div class="flex items-start gap-2 text-sm text-gray-500">
            <input type="checkbox" class="mt-1"/>
            <span>I agree to the <a href="#" class="text-blue-600 hover:underline">Terms of Service</a> and <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a></span>
          </div>
          <button onclick="handleRegister()"
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition text-sm">
            Create Account
          </button>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">
          Already have an account?
          <a href="login.html" class="text-blue-600 font-medium hover:underline">Login here</a>
        </p>
        <p class="text-center text-sm text-gray-500 mt-2">
          Are you a company?
          <a href="register-company.html" class="text-blue-600 font-medium hover:underline">Register as Company</a>
        </p>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      async function handleRegister() {
        const inputs = document.querySelectorAll('input');
        const firstName = inputs[0].value;
        const lastName = inputs[1].value;
        const email = inputs[2].value;
        const phone = inputs[3].value;
        const password = inputs[4].value;
        const confirmPassword = inputs[5].value;

        if (!firstName || !lastName || !email || !password) {
          alert('⚠️ Please fill in all required fields');
          return;
        }
        if (password !== confirmPassword) {
          alert('⚠️ Passwords do not match');
          return;
        }
        if (password.length < 6) {
          alert('⚠️ Password must be at least 6 characters');
          return;
        }

        const result = await registerCandidate({
          firstName, lastName, email, phone, password
        });

        if (result.success) {
          saveToken(result.token);
          saveUser(result.user);
          alert('✅ Registration successful!');
          window.location.href = 'user-dashboard.html';
        } else {
          alert('❌ ' + result.message);
        }
      }
    </script>

  </body>
</html>
