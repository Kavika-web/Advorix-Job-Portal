<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Company Register – Advorix Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Inter', sans-serif; }</style>
  </head>
  <body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md">

      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="index.html">
          <h1 class="text-3xl font-bold text-blue-600">Advorix<span class="text-gray-800">Jobs</span></h1>
        </a>
        <p class="text-gray-500 mt-2 text-sm">Register your company account</p>
      </div>

      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">🏢 Company Registration</h2>

        <div class="space-y-4">
          <div>
            <label class="text-sm font-medium text-gray-700 block mb-1">Company Name</label>
            <input type="text" placeholder="Acme Corp"
              class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-700 block mb-1">Industry</label>
            <select class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500 text-gray-600">
              <option value="">Select industry...</option>
              <option>Technology</option>
              <option>Finance</option>
              <option>Healthcare</option>
              <option>Education</option>
              <option>Marketing</option>
              <option>Engineering</option>
              <option>Other</option>
            </select>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-700 block mb-1">Company Email</label>
            <input type="email" placeholder="hr@company.com"
              class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-700 block mb-1">Company Website</label>
            <input type="url" placeholder="https://yourcompany.com"
              class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-700 block mb-1">Password</label>
            <input type="password" placeholder="Min. 8 characters"
              class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-700 block mb-1">Confirm Password</label>
            <input type="password" placeholder="••••••••"
              class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm outline-none focus:border-blue-500"/>
          </div>
          <div class="flex items-start gap-2 text-sm text-gray-500">
            <input type="checkbox" class="mt-1"/>
            <span>I agree to the <a href="#" class="text-blue-600 hover:underline">Terms of Service</a> and <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a></span>
          </div>
          <button
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition text-sm">
            Register Company
          </button>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">
          Already have an account?
          <a href="login.html" class="text-blue-600 font-medium hover:underline">Login here</a>
        </p>
        <p class="text-center text-sm text-gray-500 mt-2">
          Are you a candidate?
          <a href="register.html" class="text-blue-600 font-medium hover:underline">Register as Candidate</a>
        </p>
      </div>
    </div>

  </body>
</html>
